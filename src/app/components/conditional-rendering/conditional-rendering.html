<h1 class="page-title">Conditional Rendering</h1>
<p class="page-subtitle">Show or hide elements based on conditions using @if, @else, and signals.</p>

<div class="card">
  <h3>Basic @if / @else</h3>
  <div class="message-box" [class.visible]="showMessage" [class.hidden]="!showMessage">
    @if (showMessage) {
      Welcome to Angular 21!
    } @else {
      Message is hidden.
    }
  </div>
</div>

<div class="card">
  <h3>Signal-based Toggle</h3>
  <button class="btn-primary" (click)="show.set(!show())">Toggle</button>
  <div class="message-box" style="margin-top: 12px" [class.visible]="show()" [class.hidden]="!show()">
    @if (show()) {
      Now you see me!
    } @else {
      Now I'm hidden.
    }
  </div>
</div>
