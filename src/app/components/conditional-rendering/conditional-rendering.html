<p>conditional-rendering works!</p>


@if (showMessage) {
  <p>Welcome to Angular 21!</p>
} @else {
  <p>Message is hidden.</p>
}

<h3>Conditional Rendering</h3>
    <button (click)="show.set(!show())">Toggle</button>
    @if (show()) { <p>Now you see me!</p> } @else { <p>Now I'm hidden.</p> }
